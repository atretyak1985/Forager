services:
  searxng:
    image: searxng/searxng:latest
    container_name: forager-searxng
    ports:
      - "127.0.0.1:8888:8080"   # localhost only — do not expose externally
    volumes:
      - ./searxng:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888/
    restart: unless-stopped

  sandbox:
    build: ./sandbox
    container_name: forager-sandbox
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 2g
    cpus: 2
    pids_limit: 256
    volumes:
      - ${FORAGER_WORKSPACE:-/srv/forager/workspace}:/workspace
